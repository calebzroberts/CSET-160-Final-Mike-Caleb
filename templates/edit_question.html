{% extends 'base.html' %}
{% block title %}Edit Question{% endblock %}
{% block content %}
  <section class="panel">
    <h2>Edit Question</h2>
    <form method="post" class="form-grid">
      <label>Question text<textarea name="text" rows="3" required>{{ question.text }}</textarea></label>
      <label>Choice A<input type="text" name="choice_a" required value="{{ question.choice_a }}" /></label>
      <label>Choice B<input type="text" name="choice_b" required value="{{ question.choice_b }}" /></label>
      <label>Choice C<input type="text" name="choice_c" required value="{{ question.choice_c }}" /></label>
      <label>Choice D<input type="text" name="choice_d" required value="{{ question.choice_d }}" /></label>
      <label>Correct choice
        <select name="correct_choice" required>
          <option value="A" {% if question.correct_choice == 'A' %}selected{% endif %}>A</option>
          <option value="B" {% if question.correct_choice == 'B' %}selected{% endif %}>B</option>
          <option value="C" {% if question.correct_choice == 'C' %}selected{% endif %}>C</option>
          <option value="D" {% if question.correct_choice == 'D' %}selected{% endif %}>D</option>
        </select>
      </label>
      <button type="submit" class="btn btn-primary">Save</button>
      <a class="btn btn-secondary" href="{{ url_for('test_editor', test_id=test_id) }}">Back</a>
    </form>
  </section>
{% endblock %}
