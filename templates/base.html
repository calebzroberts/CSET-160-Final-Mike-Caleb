<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>{% block title %}Course Test App{% endblock %}</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Roboto+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="{{ url_for('static', filename='styles/app.css') }}" />
	</head>
	<body>
		<nav class="top-nav">
			<div class="nav-inner container">
				<h1 class="brand">The Best Test</h1>
				<div class="nav-links">
					<a href="{{ url_for('index') }}">Home</a>
					<a href="{{ url_for('accounts') }}">Accounts</a>
					<a href="{{ url_for('tests') }}">Tests</a>
					<a href="{{ url_for('take_test_select') }}">Take Test</a>
					<a href="{{ url_for('responses') }}">Responses</a>
					<a href="{{ url_for('students') }}">Students</a>
					<a href="{{ url_for('register') }}">Register</a>
				</div>
			</div>
		</nav>
		<main class="container">
			{% with messages = get_flashed_messages(with_categories=true) %}
				{% if messages %}
				<div class="flash-container">
					{% for category, message in messages %}
					<div class="flash flash-{{ category }}">{{ message }}</div>
					{% endfor %}
				</div>
				{% endif %}
			{% endwith %}
			{% block content %}{% endblock %}
		</main>
	</body>
</html>
