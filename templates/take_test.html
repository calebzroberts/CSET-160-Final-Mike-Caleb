{% extends 'base.html' %}
{% block title %}Take Test: {{ test.title }}{% endblock %}
{% block content %}
	<section class="panel">
		<h2>{{ test.title }}</h2>
		<p><strong>Student:</strong> {{ student.name }}</p>
		<form method="post" class="form-grid">
		{% for q in questions %}
			<div class="test-card">
			<h3>Q{{ loop.index }}: {{ q.text }}</h3>
			<label>Answer<textarea name="q_{{ q_number }}" rows="2"></textarea></label>
			</div>
		{% else %}
			<p>No questions in this test yet.</p>
		{% endfor %}
		<button type="submit" class="btn btn-primary">Submit Answers</button>
		</form>
	</section>
{% endblock %}
