{% extends 'base.html' %}
{% block title %}Students{% endblock %}
{% block content %}
	<section class="panel">
		<h2>Students</h2>
		<table class="data-table">
		<thead><tr><th>Name</th><th>Email</th><th>Details</th></tr></thead>
		<tbody>
			{% if students %}
			{% for s in students %}
			<tr>
				<td>{{ s.name }}</td>
				<td>{{ s.email }}</td>
				<td><a class="link-btn" href="{{ url_for('student_detail', student_id=s.id) }}">View</a></td>
			</tr>
			{% endfor %}
			{% else %}
			<tr><td colspan="3">No students found.</td></tr>
			{% endif %}
		</tbody>
		</table>
	</section>
{% endblock %}
