{% extends 'base.html' %}
{% block title %}Response Details{% endblock %}
{% block content %}
	<section class="panel">
		<h2>{{ student.name }} - {{ test.title }}</h2>
		<table class="data-table">
			<thead><tr><th>Question</th><th>Answer</th></tr></thead>
			<tbody>
				{% for answer in answers %}
				<tr>
					<td>{{ answer.question.q_txt }}</td>
					<td>{{ answer.content }}</td>
				</tr>
				{% endfor %}
			</tbody>
		</table>
		<p><strong>Grade:</strong> {{ grade }}</p>

		<a href="{{ url_for('student_detail', student_id=student.id) }}" class="btn btn-secondary">Back to Student Summary</a>
	</section>
{% endblock %}
